// MÉMO — OPÉRATIONS SUR TITRES (splits, spin-offs, AG)
// Aucun type de mouvement dédié : on s'appuie sur l'achat/vente à 0 €
// (la « règle du montant nul » : 0 € n'impacte ni le cash ni le « dernier mvt »).
//
//  • SPLIT à la hausse (ex. 10:1) ou ACTIONS GRATUITES / DIVIDENDE EN ACTIONS :
//      → saisir un ACHAT à 0 € du nombre d'actions CRÉÉES
//        (= détention actuelle × (ratio − 1) ; pour 10:1 sur 25 titres → +225).
//      Effet : coût de revient inchangé, quantité corrigée, PRU divisé tout seul,
//      valorisation réalignée sur le cours Yahoo (déjà ajusté post-split). Cash intact.
//
//  • REGROUPEMENT / REVERSE SPLIT (ex. 1:10) :
//      → saisir une VENTE à 0 € du nombre d'actions SUPPRIMÉES.
//      Attention : cette vente à 0 € inscrit une micro PERTE réalisée égale au
//      coût de revient des titres retirés (effet du PRU roulant). Acceptable et rare.
//
//  • SPIN-OFF (réception d'une nouvelle ligne sans débourser de cash) :
//      → créer la nouvelle position et y saisir un ACHAT à 0 € de la quantité reçue.
//      Cash et total du portefeuille restent EXACTS. Seule l'attribution par ligne
//      est approchée : l'enfant démarre à coût 0 (100 % latent), le parent garde tout
//      son coût. À la revente, les réalisés parent/enfant se compensent → juste en agrégé.
//
//  Repère : un cours Yahoo qui s'effondre brutalement d'un facteur rond (×10, ÷10)
//  = split non encore saisi. Ce n'est pas un bug de cotation.
// ───────────────────────────────────────────────────────

// Mois pleins (échus) écoulés depuis une date 'YYYY-MM-DD'
function monthsElapsed(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr+'T00:00:00');
  if(isNaN(d.getTime())) return null;
  const now=new Date();
  let m=(now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
  if(now.getDate()<d.getDate()) m--;          // mois pas encore révolu
  return m<0?0:m;
}
const fmtDate = s => s ? new Date(s+'T00:00:00').toLocaleDateString('fr-FR') : '—';

function PieChart({data,colorMap,size=170}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return <div style={{color:'#9CA3AF',textAlign:'center',padding:20,fontSize:12}}>Renseignez les mouvements</div>;
  let cum=-Math.PI/2; const R=80,cx=100,cy=100;
  const slices=data.map((d,i)=>{
    const angle=(d.value/total)*2*Math.PI,a1=cum,a2=cum+angle; cum=a2;
    return{...d,x1:cx+R*Math.cos(a1),y1:cy+R*Math.sin(a1),x2:cx+R*Math.cos(a2),y2:cy+R*Math.sin(a2),
      large:angle>Math.PI?1:0,mx:cx+(R*.65)*Math.cos((a1+a2)/2),my:cy+(R*.65)*Math.sin((a1+a2)/2),
      pct:Math.round(d.value/total*100),color:(colorMap&&colorMap[d.name])||d.color||'#2563EB'};
  });
  return(
    <svg viewBox="0 0 200 200" style={{width:size,height:size}}>
      {slices.map((sl,i)=>(
        <g key={i}>
          <path d={`M ${cx} ${cy} L ${sl.x1} ${sl.y1} A ${R} ${R} 0 ${sl.large} 1 ${sl.x2} ${sl.y2} Z`} fill={sl.color} stroke="#FFF" strokeWidth="2"/>
          {sl.pct>5&&<text x={sl.mx} y={sl.my} textAnchor="middle" dominantBaseline="middle" style={{fontSize:10,fill:'#fff',fontWeight:700}}>{sl.pct}%</text>}
        </g>
      ))}
    </svg>
  );
}

// ── Recherche de ticker Yahoo Finance (via /api/search serverless) ──
function TickerSearch({onPick}){
  const [q,setQ]=useState('');
  const [res,setRes]=useState([]);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState(null);
  async function run(){
    const term=q.trim();
    if(!term){setRes([]);return;}
    setBusy(true);setErr(null);
    try{
      const r=await fetch(`/api/search?q=${encodeURIComponent(term)}`);
      const d=await r.json();
      setRes(d.quotes||[]);
      if(!(d.quotes||[]).length) setErr('Aucun résultat');
    }catch(e){ setErr('Recherche indisponible (backend requis)'); }
    setBusy(false);
  }
  return(
    <div style={{marginBottom:14,padding:12,background:'#FAFAF8',border:'1px solid #EEEDE9',borderRadius:8}}>
      <label style={{fontSize:11,color:'#9CA3AF',marginBottom:4,display:'block'}}>🔍 Rechercher un ticker (nom de société ou symbole)</label>
      <div style={{display:'flex',gap:6}}>
        <input style={{flex:1,background:'#FFF',border:'1px solid #E0DED8',borderRadius:6,padding:'5px 8px',fontSize:13}}
          value={q} placeholder="ex. Hermès, Novo, ASML…"
          onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&run()}/>
        <button style={{padding:'6px 14px',borderRadius:6,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,background:'#191919',color:'#fff'}}
          onClick={run} disabled={busy}>{busy?'…':'Chercher'}</button>
      </div>
      {err&&<div style={{fontSize:11,color:'#DC2626',marginTop:6}}>{err}</div>}
      {res.length>0&&(
        <div style={{marginTop:8,maxHeight:200,overflowY:'auto',border:'1px solid #EEEDE9',borderRadius:6,background:'#FFF'}}>
          {res.map((x,i)=>(
            <div key={i} onClick={()=>{onPick(x);setRes([]);setQ('');}}
              style={{display:'flex',justifyContent:'space-between',gap:8,padding:'7px 10px',cursor:'pointer',borderBottom:'1px solid #F7F6F3'}}
              onMouseEnter={e=>e.currentTarget.style.background='#FAFAF8'}
              onMouseLeave={e=>e.currentTarget.style.background='#FFF'}>
              <div><strong style={{fontSize:13}}>{x.symbol}</strong> <span style={{fontSize:12,color:'#6B7280'}}>{x.name}</span></div>
              <span style={{fontSize:11,color:'#9CA3AF',whiteSpace:'nowrap'}}>{x.exchange}{x.type?' · '+x.type:''}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MovementsEditor({value,onChange,s}){
  const mv=Array.isArray(value)?value:[];
  const set=(i,k,v)=>{const n=mv.map((m,j)=>j===i?{...m,[k]:v}:m);onChange(n);};
  const add=()=>onChange([...mv,{date:new Date().toISOString().slice(0,10),type:'achat',qte:'',montant:''}]);
  const rm=i=>onChange(mv.filter((_,j)=>j!==i));
  const cols='130px 110px 1fr 1fr 32px';
  return(
    <div style={{marginTop:8}}>
      <div style={{fontSize:11,color:'#9CA3AF',marginBottom:6,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em'}}>Mouvements</div>
      {mv.length===0&&<div style={{fontSize:12,color:'#D1D5DB',marginBottom:8}}>Aucun mouvement — ajoutez le premier achat.</div>}
      {mv.length>0&&(
        <div style={{display:'grid',gridTemplateColumns:cols,gap:6,marginBottom:4}}>
          {['Date','Sens','Nombre d\u2019actions','Montant total (\u20AC)',''].map((h,i)=>(
            <div key={i} style={{fontSize:10,color:'#9CA3AF',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.04em'}}>{h}</div>
          ))}
        </div>
      )}
      {mv.map((m,i)=>(
        <div key={i} style={{display:'grid',gridTemplateColumns:cols,gap:6,marginBottom:6,alignItems:'center'}}>
          <input style={s.inp} type="date" value={m.date||''} onChange={e=>set(i,'date',e.target.value)}/>
          <select style={{...s.inp,color:m.type==='vente'?'#DC2626':'#16A34A',fontWeight:600}} value={m.type} onChange={e=>set(i,'type',e.target.value)}>
            <option value="achat">Achat</option>
            <option value="vente">Vente</option>
          </select>
          <input style={s.inp} type="text" inputMode="decimal" placeholder="ex. 12,5" value={m.qte??''} onChange={e=>set(i,'qte',e.target.value)}/>
          <input style={s.inp} type="text" inputMode="decimal" placeholder="ex. 1 540,00 €" value={m.montant??''} onChange={e=>set(i,'montant',e.target.value)}/>
          <button style={{...s.btn,background:'#FEE2E2',color:'#DC2626',padding:'4px 0'}} onClick={()=>rm(i)}>✕</button>
        </div>
      ))}
      <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',marginTop:4,fontSize:12,padding:'4px 12px'}} onClick={add}>+ Ajouter un mouvement</button>
    </div>
  );
}

function TitleStats({c,mask}){
  const M=mask||(v=>v);
  const sign=n=>n==null?'#9CA3AF':n>=0?'#16A34A':'#DC2626';
  const sv=n=>n==null?'—':M((n>=0?'+':'−')+fmtEUR(Math.abs(n)));
  const cells=[
    {l:'Achats',v:c.buyEUR?M(fmtEUR(c.buyEUR)):'—'},
    {l:'Ventes',v:c.sellEUR?M(fmtEUR(c.sellEUR)):'—'},
    {l:'Investi net',v:c.investedEUR?M(fmtEUR(c.investedEUR)):'—'},
    {l:'Valorisation',v:c.valEUR?M(fmtEUR(c.valEUR)):'—'},
    {l:'Réalisé',v:sv(c.realized),clr:sign(c.realized),sub:c.divEUR?('dont dividendes : '+M((c.divEUR>=0?'+':'−')+fmtEUR(Math.abs(c.divEUR)))):null},
    {l:'Latent',v:sv(c.latent),clr:sign(c.latent)},
    {l:'Résultat total',v:sv(c.result),clr:sign(c.result)},
  ];
  return(
    <div style={{display:'flex',gap:20,flexWrap:'wrap',padding:'10px 14px',background:'#FFFFFF',border:'1px solid #EEEDE9',borderRadius:8,marginBottom:14}}>
      {cells.map(({l,v,clr,sub})=>(
        <div key={l}>
          <div style={{fontSize:10,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.05em'}}>{l}</div>
          <div style={{fontWeight:700,fontSize:16,marginTop:2,color:clr||'#191919'}}>{v}</div>
          {sub&&<div style={{fontSize:10,color:'#9CA3AF',marginTop:2}}>{sub}</div>}
        </div>
      ))}
    </div>
  );
}

function App(){
  const [pos,       setPos]       = useState([]);
  const [wl,        setWl]        = useState([]);
  const [cashFlows, setCashFlows] = useState([]);
  const [prices,    setPrices]    = useState({});
  const [fx,        setFX]        = useState({});
  const [loading,   setLoading]   = useState(true);
  const [fetching,  setFetching]  = useState(false);
  const [lastUpd,   setLastUpd]   = useState(null);
  const [error,     setError]     = useState(null);
  const [tab,       setTab]       = useState('portfolio');
  const [expanded,  setExpanded]  = useState(new Set());
  const [editId,    setEditId]    = useState(null);
  const [addNew,    setAddNew]    = useState(false);
  const [delId,     setDelId]     = useState(null);
  const [fEnv,      setFEnv]      = useState('ALL');
  const [fCat,      setFCat]      = useState('ALL');
  const [wlAdding,  setWlAdding]  = useState(false);
  const [wlEditId,  setWlEditId]  = useState(null);
  const [hideAmt,   setHideAmt]   = useState(false);     // masquage des montants
  const [inclCash,  setInclCash]  = useState(true);      // inclure le cash dans l'allocation valo
  const [cashAdding,setCashAdding]= useState(false);
  const [cashEditId,setCashEditId]= useState(null);
  const [cashDelId, setCashDelId] = useState(null);
  const [cashEnvFilter,setCashEnvFilter]=useState('ALL');
  const [cashYear,setCashYear]=useState('ALL');
  const [editorTab,setEditorTab]=useState('portfolio'); // sous-onglet éditeur : portfolio / watchlist / sortis

  const m = v => hideAmt ? '•••' : v;                    // helper de masquage

  const toEUR=(amount,currency)=>{
    if(amount==null) return null;
    if(!currency||currency==='EUR') return amount;
    if(currency==='USD') return fx['EURUSD=X']?amount/fx['EURUSD=X']:null;
    if(currency==='CAD') return fx['EURCAD=X']?amount/fx['EURCAD=X']:null;
    if(currency==='DKK') return fx['EURDKK=X']?amount/fx['EURDKK=X']:null;
    return amount;
  };

  function calcPos(p){
    const mv=Array.isArray(p.mouvements)?p.mouvements:[];
    const px=prices[p.ticker], cours=px?.p??null, cur=px?.c??'';
    // Parcours chronologique : PRU roulant + plus-value réalisée figée à chaque vente
    const ordered=[...mv].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    let buyQ=0,buyEUR=0,sellQ=0,sellEUR=0;          // cumuls bruts (affichage)
    let runQ=0,runCost=0,realizedGain=0;            // qté détenue, coût de revient € détenu, PV réalisée €
    ordered.forEach(x=>{
      const q=num(x.qte), mt=num(x.montant);
      if(x.type==='vente'){
        sellQ+=q; sellEUR+=mt;
        const pru=runQ>0?runCost/runQ:0;
        const coutVendu=Math.min(pru*q, runCost);   // coût de revient des titres sortis (PRU du moment)
        realizedGain += mt - coutVendu;             // produit − coût = plus-value réalisée
        runQ=Math.max(runQ-q,0); runCost=Math.max(runCost-coutVendu,0);
      }else{
        buyQ+=q; buyEUR+=mt;
        runQ+=q; runCost+=mt;                        // renforcement : le PRU se recalcule de fait
      }
    });
    const qte=runQ;
    const investedEUR=buyEUR-sellEUR;            // somme investie nette = total achats − total ventes
    const valNat=cours&&qte>0?cours*qte:0;
    const valEUR=toEUR(valNat,cur);              // valorisation : cours live converti en €
    const divEUR=cashFlows.filter(x=>x.type==='dividende'&&x.ticker===p.ticker&&x.env===p.env).reduce((a,x)=>a+num(x.montant),0);
    const realized=realizedGain+divEUR;          // réalisé = PV réalisée + dividendes
    const latent=valEUR!=null?(valEUR-runCost):null; // latent = valo − coût de revient des titres détenus
    const result=latent!=null?(realized+latent):null;   // total = réalisé + latent (= valo+div−investi)
    const buyDates=mv.filter(x=>x.type!=='vente').map(x=>x.date).filter(Boolean).sort();
    const firstBuy=buyDates[0]||null;
    let last=null,lastType=null;
    mv.forEach(x=>{ if(num(x.montant)===0) return;   // mouvement à 0 € (frais/ajustement) : ignoré pour le « dernier mouvement »
      if(x.date&&(last==null||x.date>=last)){last=x.date;lastType=x.type;} });
    const holdM=monthsElapsed(firstBuy);
    const sinceM=monthsElapsed(last);
    const pc2=p.pc1>0?p.pc1*(1-p.mos/200):0;
    const pc3=p.pc1>0?p.pc1*(1-p.mos/100):0;
    const mos1=cours&&p.pc1?((p.pc1-cours)/p.pc1)*100:null;
    const mos2=cours&&pc2?((pc2-cours)/pc2)*100:null;
    const mos3=cours&&pc3?((pc3-cours)/pc3)*100:null;
    return {mv,cours,cur,qte,buyEUR,sellEUR,investedEUR,valEUR,divEUR,realizedGain,realized,latent,result,firstBuy,last,lastType,holdM,sinceM,pc2,pc3,mos1,mos2,mos3};
  }

  // Fusionne plusieurs lignes d'un même ticker (ex. PEA + CTO) en une synthèse unique.
  // PRU roulant GLOBAL : on coule tous les mouvements des poches dans un seul parcours chronologique.
  // Chaque mouvement conserve son enveloppe (mvt.env) pour l'affichage détaillé.
  function mergeCalc(group){
    const ticker=group[0].ticker, name=group[0].name, cat=group[0].cat;
    const px=prices[ticker], cours=px?.p??null, cur=px?.c??'';
    const envs=[...new Set(group.map(p=>p.env))];
    const allMv=[];
    group.forEach(p=>(Array.isArray(p.mouvements)?p.mouvements:[]).forEach(mvt=>allMv.push({...mvt,env:p.env})));
    const ordered=[...allMv].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    let buyEUR=0,sellEUR=0,runQ=0,runCost=0,realizedGain=0;
    ordered.forEach(x=>{
      const q=num(x.qte), mt=num(x.montant);
      if(x.type==='vente'){
        sellEUR+=mt;
        const pru=runQ>0?runCost/runQ:0;
        const coutVendu=Math.min(pru*q, runCost);
        realizedGain += mt - coutVendu;
        runQ=Math.max(runQ-q,0); runCost=Math.max(runCost-coutVendu,0);
      }else{ buyEUR+=mt; runQ+=q; runCost+=mt; }
    });
    const qte=runQ;
    const investedEUR=buyEUR-sellEUR;
    const valNat=cours&&qte>0?cours*qte:0;
    const valEUR=toEUR(valNat,cur);
    const divEUR=cashFlows.filter(x=>x.type==='dividende'&&x.ticker===ticker&&envs.includes(x.env)).reduce((a,x)=>a+num(x.montant),0);
    const realized=realizedGain+divEUR;
    const latent=valEUR!=null?(valEUR-runCost):null;
    const result=latent!=null?(realized+latent):null;
    const buyDates=allMv.filter(x=>x.type!=='vente').map(x=>x.date).filter(Boolean).sort();
    const firstBuy=buyDates[0]||null;
    let last=null,lastType=null;
    allMv.forEach(x=>{ if(num(x.montant)===0) return;
      if(x.date&&(last==null||x.date>=last)){last=x.date;lastType=x.type;} });
    const holdM=monthsElapsed(firstBuy), sinceM=monthsElapsed(last);
    return {ticker,name,cat,envs,group,mv:ordered,cours,cur,qte,buyEUR,sellEUR,investedEUR,valEUR,divEUR,realizedGain,realized,latent,result,firstBuy,last,lastType,holdM,sinceM};
  }

  useEffect(()=>{init();},[]);

  async function init(){
    const {data:posData,error:e1}=await db.from('positions').select('*').order('id');
    if(e1){setError('Supabase: '+e1.message);setLoading(false);return;}
    let positions=posData&&posData.length>0?posData:[];
    if(positions.length===0){
      const {data:seeded}=await db.from('positions').insert(SEED).select();
      positions=seeded||[];
    }
    setPos(positions);
    const {data:wlData}=await db.from('watchlist').select('*').order('id');
    const watchlist=wlData||[];
    setWl(watchlist);
    const {data:cashData}=await db.from('cash_flows').select('*').order('id');
    setCashFlows(cashData||[]);
    await doFetch(positions,watchlist);
    setLoading(false);
  }

  async function doFetch(p,w){
    setFetching(true);setError(null);
    const positions=p||pos, watchlist=w||wl;
    const allTickers=[...new Set([
      ...positions.map(x=>x.ticker),
      ...watchlist.map(x=>x.ticker),
      ...FX_TICKERS,
    ])];
    try{
      const px=await fetchAllPrices(allTickers);
      const newFX={};
      FX_TICKERS.forEach(t=>{if(px[t]){newFX[t]=px[t].p;delete px[t];}});
      setFX(newFX);setPrices(px);setLastUpd(new Date());
    }catch(e){setError('Erreur : '+e.message);}
    setFetching(false);
  }

  async function fetchAllPrices(tickers){
    const BATCH=10,px={};
    for(let i=0;i<tickers.length;i+=BATCH){
      const syms=tickers.slice(i,i+BATCH).join(',');
      try{
        const r=await fetch(`/api/prices?symbols=${encodeURIComponent(syms)}`);
        const d=await r.json();
        (d.quoteResponse?.result||[]).forEach(q=>{px[q.symbol]={p:q.regularMarketPrice,c:q.currency,h52:q.fiftyTwoWeekHigh,l52:q.fiftyTwoWeekLow};});
      }catch{}
    }
    return px;
  }

  // Retire les colonnes non modifiables (PK identité + timestamp auto) avant tout UPDATE
  const stripMeta = ({id, created_at, ...rest}) => rest;

  // Positions CRUD
  async function addPos(f){const {data}=await db.from('positions').insert([f]).select();if(data){const u=[...pos,...data];setPos(u);doFetch(u,wl);}setAddNew(false);}
  async function updPos(f){
    const patch=stripMeta(f);
    const {error}=await db.from('positions').update(patch).eq('id',f.id);
    if(error){setError('MAJ position : '+error.message);return;}
    const u=pos.map(x=>x.id===f.id?{...x,...patch}:x);setPos(u);setEditId(null);doFetch(u,wl);
  }
  async function delPos(id){await db.from('positions').delete().eq('id',id);setPos(pos.filter(x=>x.id!==id));setDelId(null);}

  // Watchlist CRUD
  async function addWl(f){const {data}=await db.from('watchlist').insert([f]).select();if(data){const u=[...wl,...data];setWl(u);doFetch(pos,u);}setWlAdding(false);}
  async function updWl(f){
    const patch=stripMeta(f);
    const {error}=await db.from('watchlist').update(patch).eq('id',f.id);
    if(error){setError('MAJ watchlist : '+error.message);return;}
    setWl(wl.map(x=>x.id===f.id?{...x,...patch}:x));setWlEditId(null);
  }
  async function delWl(id){await db.from('watchlist').delete().eq('id',id);setWl(wl.filter(x=>x.id!==id));}

  // Cash CRUD
  async function addCash(f){const {data}=await db.from('cash_flows').insert([f]).select();if(data)setCashFlows([...cashFlows,...data]);setCashAdding(false);}
  async function updCash(f){
    const patch=stripMeta(f);
    const {error}=await db.from('cash_flows').update(patch).eq('id',f.id);
    if(error){setError('MAJ liquidités : '+error.message);return;}
    setCashFlows(cashFlows.map(x=>x.id===f.id?{...x,...patch}:x));setCashEditId(null);
  }
  async function delCash(id){await db.from('cash_flows').delete().eq('id',id);setCashFlows(cashFlows.filter(x=>x.id!==id));setCashDelId(null);}

  // Toggle d'une cible (pc1_on/pc2_on/pc3_on) sur la bonne table
  async function setPcFlag(line,key,val){
    if(line.wlType==='watch'){
      await db.from('watchlist').update({[key]:val}).eq('id',line.id);
      setWl(wl.map(x=>x.id===line.id?{...x,[key]:val}:x));
    }else{
      await db.from('positions').update({[key]:val}).eq('id',line.id);
      setPos(pos.map(x=>x.id===line.id?{...x,[key]:val}:x));
    }
  }

  const toggle=id=>setExpanded(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});

  const s={
    btn: {padding:'6px 14px',borderRadius:6,border:'none',cursor:'pointer',fontSize:13,fontWeight:600},
    lbl: {fontSize:11,color:'#9CA3AF',marginBottom:4,display:'block'},
    inp: {background:'#FFFFFF',border:'1px solid #E0DED8',borderRadius:6,padding:'5px 8px',color:'#191919',fontSize:13,width:'100%'},
    th:  {padding:'9px 12px',textAlign:'left',color:'#9CA3AF',fontWeight:600,fontSize:11,textTransform:'uppercase',letterSpacing:'0.05em',borderBottom:'1px solid #F0EFE9',whiteSpace:'nowrap'},
    td:  {padding:'10px 12px',borderBottom:'1px solid #F7F6F3',verticalAlign:'middle'},
    card:{background:'#FFFFFF',borderRadius:12,padding:16,border:'1px solid #EEEDE9'},
  };

  if(loading) return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#F7F6F3'}}>
      <div style={{textAlign:'center',color:'#9CA3AF'}}><div style={{fontSize:44,marginBottom:12}}>📊</div><div>Chargement...</div></div>
    </div>
  );

  // ── Données dérivées ──
  const calc = {}; pos.forEach(p=>{calc[p.id]=calcPos(p);});
  const held    = pos.filter(p=>calc[p.id].qte>0);                 // en portefeuille
  const exited  = pos.filter(p=>calc[p.id].qte<=0 && calc[p.id].mv.length>0); // sortis
  // Sous-listes de l'Éditeur (table positions) : détenus / watch (sans mouvement) / sortis
  const editorCats={
    portfolio: pos.filter(p=>calc[p.id].qte>0),
    watchlist: pos.filter(p=>calc[p.id].qte<=0 && calc[p.id].mv.length===0),
    sortis:    pos.filter(p=>calc[p.id].qte<=0 && calc[p.id].mv.length>0),
  };
  const editorList=[...(editorCats[editorTab]||[])].sort((a,b)=>(a.ticker||'').localeCompare(b.ticker||'')||(a.env||'').localeCompare(b.env||''));

  const filtered=held.filter(p=>(fEnv==='ALL'||p.env===fEnv)&&(fCat==='ALL'||p.cat===fCat));
  const grouped =CATS.map(cat=>({cat,items:filtered.filter(p=>p.cat===cat)})).filter(g=>g.items.length>0);
  const totalValEUR =held.reduce((a,p)=>a+(calc[p.id].valEUR||0),0);
  const totalInvEUR =held.reduce((a,p)=>a+(calc[p.id].investedEUR||0),0);

  // ── Cash par enveloppe = Σapports − Σretraits − Σachats(env) + Σventes(env) ──
  const cashByEnv={}; ENVS.forEach(e=>cashByEnv[e]=0);
  cashFlows.forEach(c=>{ if(cashByEnv[c.env]!=null) cashByEnv[c.env]+= c.type==='retrait'?-num(c.montant):num(c.montant); });
  pos.forEach(p=>{
    if(cashByEnv[p.env]==null) return;
    (Array.isArray(p.mouvements)?p.mouvements:[]).forEach(mvt=>{
      const mt=num(mvt.montant);
      cashByEnv[p.env]+= mvt.type==='vente'? mt : -mt;
    });
  });
  const totalCash = ENVS.reduce((a,e)=>a+cashByEnv[e],0);
  const grandTotal = totalValEUR + totalCash;          // titres + cash
  const cashTickers = [...new Map(held.map(p=>[p.ticker,{ticker:p.ticker,name:p.name}])).values()]; // dividendes : titres détenus uniquement
  // Registre cash fusionné (flux + trades) pour l'enveloppe filtrée, trié chrono + solde cumulé
  const cashLedger=(()=>{
    const evs=[];
    cashFlows.forEach(cf=>{
      if(cashEnvFilter!=='ALL'&&cf.env!==cashEnvFilter) return;
      evs.push({source:'cash',id:cf.id,raw:cf,date:cf.date,env:cf.env,kind:cf.type,label:cf.type==='dividende'?(cf.ticker||''):'',amount:(cf.type==='retrait'?-1:1)*num(cf.montant)});
    });
    pos.forEach(p=>{
      if(cashEnvFilter!=='ALL'&&p.env!==cashEnvFilter) return;
      (Array.isArray(p.mouvements)?p.mouvements:[]).forEach(mvt=>{
        const mt=num(mvt.montant); if(mt===0) return;       // 0 € = pas d'impact cash
        evs.push({source:'trade',posId:p.id,date:mvt.date,env:p.env,kind:mvt.type,label:p.ticker,amount:(mvt.type==='vente'?1:-1)*mt});
      });
    });
    evs.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||(a.source>b.source?1:-1));
    let run=0; evs.forEach(e=>{run+=e.amount;e.solde=run;});
    return evs;
  })();
  const KIND_LBL={apport:'Apport',retrait:'Retrait',dividende:'Dividende',achat:'Achat',vente:'Vente'};
  const cashYears=[...new Set(cashLedger.map(e=>(e.date||'').slice(0,4)).filter(Boolean))].sort().reverse();
  const cashRows=(cashYear==='ALL'?cashLedger:cashLedger.filter(e=>(e.date||'').slice(0,4)===cashYear)).slice().reverse();

  const catWeight = cat => {
    const v=held.filter(p=>p.cat===cat).reduce((a,p)=>a+(calc[p.id].valEUR||0),0);
    return totalValEUR>0?(v/totalValEUR)*100:0;
  };

  // Agrégation par ticker (allocation)
  const byTicker={};
  held.forEach(p=>{
    const c=calc[p.id];
    if(!byTicker[p.ticker]) byTicker[p.ticker]={ticker:p.ticker,name:p.name,cat:p.cat,envs:[],valEUR:0,invEUR:0};
    byTicker[p.ticker].valEUR+=(c.valEUR||0);
    byTicker[p.ticker].invEUR+=(c.investedEUR||0);
    if(!byTicker[p.ticker].envs.includes(p.env)) byTicker[p.ticker].envs.push(p.env);
  });
  const posRankedEUR=Object.values(byTicker).sort((a,b)=>b.valEUR-a.valEUR);
  // Allocation par enveloppe : valo titres (+ cash si activé)
  const byEnv=ENVS.map(e=>({name:e,value:Math.round(held.filter(p=>p.env===e).reduce((a,p)=>a+(calc[p.id].valEUR||0),0)+(inclCash?cashByEnv[e]:0))})).filter(x=>x.value>0);
  // Allocation par catégorie : titres + une part Liquidités si activé
  const byCat=CATS.map(c=>({name:c,value:Math.round(held.filter(p=>p.cat===c).reduce((a,p)=>a+(calc[p.id].valEUR||0),0))}))
    .concat(inclCash&&totalCash>0?[{name:'Liquidités',value:Math.round(totalCash)}]:[]).filter(x=>x.value>0);
  const byTitleInv=posRankedEUR.filter(p=>p.invEUR>0).map(p=>({name:p.ticker,value:Math.round(p.invEUR),cat:p.cat})).sort((a,b)=>b.value-a.value);
  const byTitleVal=posRankedEUR.filter(p=>p.valEUR>0).map(p=>({name:p.ticker,value:Math.round(p.valEUR),cat:p.cat})).sort((a,b)=>b.value-a.value)
    .concat(inclCash&&totalCash>0?[{name:'Liquidités',value:Math.round(totalCash),cat:'Liquidités'}]:[]);
  const titleColors={}; [...new Set([...byTitleInv,...byTitleVal].map(x=>x.name))].forEach((t,i)=>{titleColors[t]=(t==='Liquidités'||t.startsWith('Cash '))?CASH_CLR:sliceColor(i);});

  // ── Watchlist fusionnée, avec cible sélectionnable ──
  const targetIdx = l => (l.pc1_on!==false?1:l.pc2_on!==false?2:l.pc3_on!==false?3:1);
  const seenTk=new Set(); const wlMerged=[];
  pos.filter(p=>p.pc1>0 && calc[p.id].qte>0).forEach(p=>{
    if(!seenTk.has(p.ticker)){seenTk.add(p.ticker);wlMerged.push({...p,wlType:'portfolio'});}
  });
  wl.forEach(w=>{
    if(!seenTk.has(w.ticker)){seenTk.add(w.ticker);wlMerged.push({...w,wlType:'watch',env:null});}
  });
  const lineMargins = l => {
    const pr=prices[l.ticker]||{};
    const px=pr.p;
    const pc2=l.pc1>0?l.pc1*(1-l.mos/200):0, pc3=l.pc1>0?l.pc1*(1-l.mos/100):0;
    const mk=pc=>px&&pc?((pc-px)/pc)*100:null;
    const h52=pr.h52, l52=pr.l52;
    const pct52=(px!=null&&h52!=null&&l52!=null&&h52>l52)?Math.max(0,Math.min(100,((px-l52)/(h52-l52))*100)):null;
    return {cours:px,cur:pr.c||'',pc2,pc3,mos1:mk(l.pc1),mos2:mk(pc2),mos3:mk(pc3),h52,l52,pct52};
  };
  const allTargetsOff = l => !(l.pc1_on!==false||l.pc2_on!==false||l.pc3_on!==false);
  wlMerged.sort((a,b)=>{
    const aOff=allTargetsOff(a), bOff=allTargetsOff(b);
    if(aOff!==bOff) return aOff?1:-1;            // titre sans aucune cible active → en bas de liste

                        <td style={s.td}><span style={{color:CAT_CLR[p.cat],fontSize:12,fontWeight:600}}>{p.cat}</span></td>
                        <td style={s.td}><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{p.envs.map(e=><Badge key={e} text={e} color={ENV_CLR[e]}/>)}</div></td>
                        <td style={{...s.td,color:'#6B7280'}}>{p.invEUR>0?m(fmtEUR(p.invEUR)):'—'}</td>
                        <td style={{...s.td,color:'#6B7280'}}>{p.valEUR>0?m(fmtEUR(p.valEUR)):'—'}</td>
                        <td style={s.td}>
                          {totalValEUR>0&&p.valEUR>0?(
                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                              <div style={{flex:1,height:6,background:'#F0EFE9',borderRadius:3}}>
                                <div style={{width:Math.min((p.valEUR/totalValEUR)*100,100)+'%',height:'100%',background:CAT_CLR[p.cat],borderRadius:3}}/>
                              </div>
                              <span style={{minWidth:38,textAlign:'right',fontSize:12,color:'#6B7280'}}>{fmt((p.valEUR/totalValEUR)*100,1)}%</span>
                            </div>
                          ):<span style={{color:'#D1D5DB'}}>—</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ── LIQUIDITÉS ── */}
        {tab==='cash'&&(
          <div>
            {/* Soldes par enveloppe */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:12,marginBottom:20}}>
              {ENVS.map(e=>{
                const bal=cashByEnv[e];
                const envTotal=held.filter(p=>p.env===e).reduce((a,p)=>a+(calc[p.id].valEUR||0),0)+bal;
                const pct=envTotal>0?(bal/envTotal)*100:0;
                return(
                  <div key={e} style={s.card}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                      <Badge text={e} color={ENV_CLR[e]}/>
                      {bal<0&&<span style={{fontSize:10,color:'#DC2626',fontWeight:700}}>⚠ négatif</span>}
                    </div>
                    <div style={{fontSize:22,fontWeight:800,color:bal<0?'#DC2626':'#191919'}}>{m(fmtEUR(bal))}</div>
                    <div style={{fontSize:11,color:'#9CA3AF',marginTop:4}}>{bal!==0?fmt(pct,1)+'% de l\u2019enveloppe en cash':'—'}</div>
                  </div>
                );
              })}
              <div style={{...s.card,background:'#191919',color:'#fff'}}>
                <div style={{fontSize:11,color:'#9CA3AF',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.05em'}}>Cash total</div>
                <div style={{fontSize:22,fontWeight:800,color:totalCash<0?'#FCA5A5':'#fff'}}>{m(fmtEUR(totalCash))}</div>
                <div style={{fontSize:11,color:'#9CA3AF',marginTop:4}}>{grandTotal>0?fmt(totalCash/grandTotal*100,1)+'% du total':'—'}</div>
              </div>
            </div>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:16}}>Registre de liquidités</div>
                <div style={{fontSize:12,color:'#9CA3AF',marginTop:2}}>Tous les flux qui font bouger le cash : apports, retraits, dividendes et trades. Saisissez ici les apports/retraits/dividendes ; les trades viennent de l'Éditeur.</div>
              </div>
              {!cashAdding&&<button style={{...s.btn,background:'#CF6D56',color:'#fff'}} onClick={()=>{setCashAdding(true);setCashEditId(null);}}>+ Ajouter</button>}
            </div>

            {/* Filtre par enveloppe */}
            <div style={{display:'flex',gap:3,marginBottom:8}}>
              {['ALL',...ENVS].map(e=>(
                <button key={e} onClick={()=>setCashEnvFilter(e)}
                  style={{...s.btn,background:cashEnvFilter===e?(e==='ALL'?'#191919':ENV_CLR[e]):'#F0EFE9',color:cashEnvFilter===e?'#fff':'#6B7280',padding:'4px 14px',fontSize:12}}>
                  {e==='ALL'?'Toutes':e}{e!=='ALL'?'  '+m(fmtEUR(cashByEnv[e])):''}
                </button>
              ))}
            </div>
            {/* Filtre par année */}
            {cashYears.length>0&&(
              <div style={{display:'flex',gap:3,marginBottom:12,flexWrap:'wrap'}}>
                {['ALL',...cashYears].map(y=>(
                  <button key={y} onClick={()=>setCashYear(y)}
                    style={{...s.btn,background:cashYear===y?'#6B7280':'#F0EFE9',color:cashYear===y?'#fff':'#6B7280',padding:'3px 12px',fontSize:12}}>
                    {y==='ALL'?'Toutes années':y}
                  </button>
                ))}
              </div>
            )}

            {cashAdding&&(
              <div style={{...s.card,marginBottom:16}}>
                <div style={{fontWeight:600,marginBottom:12,color:'#6B7280',fontSize:13}}>Nouveau flux</div>
                <CashForm isNew init={cashEnvFilter!=='ALL'?{env:cashEnvFilter}:{}} onSave={addCash} onCancel={()=>setCashAdding(false)} s={s} tickers={cashTickers}/>
              </div>
            )}

            <div style={s.card}>
              <div style={{overflowX:'auto',maxHeight:440,overflowY:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead><tr>
                    <th style={{...s.th,position:'sticky',top:0,background:'#FFFFFF',zIndex:1}}>Date</th>
                    {cashEnvFilter==='ALL'&&<th style={{...s.th,position:'sticky',top:0,background:'#FFFFFF',zIndex:1}}>Env.</th>}
                    <th style={{...s.th,position:'sticky',top:0,background:'#FFFFFF',zIndex:1}}>Opération</th><th style={{...s.th,position:'sticky',top:0,background:'#FFFFFF',zIndex:1}}>Montant €</th>
                    {cashEnvFilter!=='ALL'&&<th style={{...s.th,position:'sticky',top:0,background:'#FFFFFF',zIndex:1}}>Solde €</th>}
                    <th style={{...s.th,position:'sticky',top:0,background:'#FFFFFF',zIndex:1}}>Actions</th>
                  </tr></thead>
                  <tbody>
                    {cashRows.length===0&&<tr><td colSpan={6} style={{...s.td,textAlign:'center',color:'#9CA3AF',padding:40}}>Aucun mouvement de cash — commencez par un apport sur l'enveloppe concernée</td></tr>}
                    {cashRows.map((e,idx)=>{
                      const isCash=e.source==='cash';
                      if(isCash&&cashEditId===e.id) return(
                        <tr key={'e'+idx}><td colSpan={6} style={{padding:16,background:'#FAFAF8'}}>
                          <CashForm init={e.raw} onSave={updCash} onCancel={()=>setCashEditId(null)} s={s} tickers={cashTickers}/>
                        </td></tr>
                      );
                      if(isCash&&cashDelId===e.id) return(
                        <tr key={'e'+idx} style={{background:'#FEF2F2'}}>
                          <td colSpan={6} style={{...s.td,padding:'12px 16px'}}>
                            <span style={{color:'#DC2626'}}>Supprimer ce flux ({e.env} · {KIND_LBL[e.kind]} · {fmtEUR(Math.abs(e.amount))}) ?</span>
                            <button style={{...s.btn,background:'#DC2626',color:'#fff',marginLeft:14,padding:'3px 12px',fontSize:12}} onClick={()=>delCash(e.id)}>Confirmer</button>
                            <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',marginLeft:6,padding:'3px 12px',fontSize:12}} onClick={()=>setCashDelId(null)}>Annuler</button>
                          </td>
                        </tr>
                      );
                      return(
                        <tr key={'e'+idx} onMouseEnter={ev=>ev.currentTarget.style.background='#FAFAF8'} onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}>
                          <td style={{...s.td,color:'#6B7280'}}>{fmtDate(e.date)}</td>
                          {cashEnvFilter==='ALL'&&<td style={s.td}><Badge text={e.env} color={ENV_CLR[e.env]}/></td>}
                          <td style={s.td}>
                            <span style={{fontWeight:600,color:e.amount>=0?'#16A34A':'#DC2626'}}>{KIND_LBL[e.kind]}</span>
                            {e.label&&<span style={{color:'#6B7280'}}> · {e.label}</span>}
                            {e.source==='trade'&&<span style={{fontSize:10,color:'#9CA3AF',marginLeft:6}}>(trade)</span>}
                          </td>
                          <td style={{...s.td,fontWeight:600,color:e.amount>=0?'#16A34A':'#DC2626'}}>{m((e.amount>=0?'+':'−')+fmtEUR(Math.abs(e.amount)))}</td>
                          {cashEnvFilter!=='ALL'&&<td style={{...s.td,color:e.solde<0?'#DC2626':'#6B7280',fontWeight:600}}>{m(fmtEUR(e.solde))}</td>}
                          <td style={s.td}>
                            {isCash?(
                              <div style={{display:'flex',gap:4}}>
                                <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',padding:'3px 10px',fontSize:12}} onClick={()=>{setCashEditId(e.id);setCashAdding(false);}}>✏️</button>
                                <button style={{...s.btn,background:'#FEE2E2',color:'#DC2626',padding:'3px 10px',fontSize:12}} onClick={()=>setCashDelId(e.id)}>🗑️</button>
                              </div>
                            ):(
                              <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',padding:'3px 10px',fontSize:12}} title="Modifier dans l'Éditeur"
                                onClick={()=>{setEditId(e.posId);setTab('editeur');}}>→ Éditeur</button>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {cashEnvFilter!=='ALL'&&cashLedger.length>0&&(
                <div style={{fontSize:11,color:'#D1D5DB',marginTop:8}}>Du plus récent au plus ancien · colonne « Solde » = liquidités après chaque opération · la ligne du haut = solde actuel de {cashEnvFilter} ({m(fmtEUR(cashByEnv[cashEnvFilter]))})</div>
              )}
            </div>
          </div>
        )}

        {/* ── SORTIS ── */}
        {tab==='sortis'&&(
          <div>
            <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>Titres sortis du portefeuille</div>
            <div style={{fontSize:12,color:'#9CA3AF',marginBottom:16}}>Quantité à zéro — conservés en mémoire (cibles, MoS, historique) au cas où ils réintègrent le portefeuille</div>
            <div style={{overflowX:'auto',borderRadius:12,border:'1px solid #EEEDE9',background:'#FFFFFF'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                <thead><tr style={{background:'#FAFAF8'}}>
                  <th style={{...s.th,width:28}}></th>
                  <th style={s.th}>Titre</th><th style={s.th}>Catégorie</th><th style={s.th}>Première entrée</th>
                  <th style={s.th}>Sortie</th><th style={s.th}>Durée détenue</th><th style={s.th}>PC1</th><th style={s.th}>MoS</th>
                </tr></thead>
                <tbody>
                  {exited.length===0&&<tr><td colSpan={8} style={{...s.td,textAlign:'center',color:'#9CA3AF',padding:40}}>Aucun titre sorti</td></tr>}
                  {exited.map(p=>{
                    const c=calc[p.id]; const isExp=expanded.has('x'+p.id);
                    const heldMonths=c.firstBuy&&c.last?monthsElapsed(c.firstBuy)-(monthsElapsed(c.last)||0):null;
                    return(
                      <Fragment key={p.id}>
                        <tr onClick={()=>toggle('x'+p.id)} style={{cursor:'pointer'}}
                          onMouseEnter={e=>e.currentTarget.style.background='#FAFAF8'}
                          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                          <td style={{...s.td,color:'#9CA3AF',fontSize:12}}>{isExp?'▾':'▸'}</td>
                          <td style={s.td}><div style={{fontWeight:600}}>{p.name}</div><div style={{fontSize:11,color:'#9CA3AF'}}>{p.ticker}</div></td>
                          <td style={s.td}><span style={{color:CAT_CLR[p.cat],fontSize:12,fontWeight:600}}>{p.cat}</span></td>
                          <td style={{...s.td,color:'#6B7280'}}>{fmtDate(c.firstBuy)}</td>
                          <td style={{...s.td,color:'#DC2626',fontWeight:600}}>{fmtDate(c.last)}</td>
                          <td style={{...s.td,color:'#6B7280'}}>{heldMonths==null?'—':heldMonths+' mois'}</td>
                          <td style={{...s.td,color:'#6B7280'}}>{p.pc1?fmt(p.pc1):'—'}</td>
                          <td style={{...s.td,color:'#6B7280'}}>{p.mos}%</td>
                        </tr>
                        {isExp&&(
                          <tr><td colSpan={8} style={{padding:'12px 24px',background:'#FAFAF8',borderBottom:'1px solid #EEEDE9'}}>
                            <TitleStats c={c} mask={m}/>
                            <table style={{borderCollapse:'collapse',fontSize:12,minWidth:340}}>
                              <thead><tr>
                                <th style={{...s.th,padding:'5px 12px'}}>Date</th><th style={{...s.th,padding:'5px 12px'}}>Sens</th>
                                <th style={{...s.th,padding:'5px 12px'}}>Nb actions</th><th style={{...s.th,padding:'5px 12px'}}>Montant €</th>
                              </tr></thead>
                              <tbody>
                                {[...c.mv].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map((mvt,i)=>(
                                  <tr key={i}>
                                    <td style={{...s.td,padding:'5px 12px'}}>{fmtDate(mvt.date)}</td>
                                    <td style={{...s.td,padding:'5px 12px',color:mvt.type==='vente'?'#DC2626':'#16A34A',fontWeight:600}}>{mvt.type==='vente'?'Vente':'Achat'}</td>
                                    <td style={{...s.td,padding:'5px 12px'}}>{m(fmtQte(num(mvt.qte)))}</td>
                                    <td style={{...s.td,padding:'5px 12px'}}>{m(fmtEUR(num(mvt.montant)))}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                            <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',marginTop:10,fontSize:12,padding:'4px 12px'}}
                              onClick={e=>{e.stopPropagation();setEditId(p.id);setTab('editeur');}}>✏️ Rouvrir / modifier</button>
                          </td></tr>
                        )}
                      </Fragment>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ── ÉDITEUR ── */}
        {tab==='editeur'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:16}}>Positions</div>
              {!addNew&&<button style={{...s.btn,background:'#CF6D56',color:'#fff'}} onClick={()=>{setAddNew(true);setEditId(null);}}>+ Ajouter</button>}
            </div>
            <div style={{display:'flex',gap:3,marginBottom:14,flexWrap:'wrap'}}>
              {[{id:'portfolio',l:'En portefeuille'},{id:'watchlist',l:'Watchlist'},{id:'sortis',l:'Sortis'}].map(({id,l})=>(
                <button key={id} onClick={()=>{setEditorTab(id);setEditId(null);}}
                  style={{...s.btn,background:editorTab===id?'#191919':'#F0EFE9',color:editorTab===id?'#fff':'#6B7280',padding:'5px 14px',fontSize:12}}>
                  {l} <span style={{opacity:0.6,marginLeft:4}}>{(editorCats[id]||[]).length}</span>
                </button>
              ))}
            </div>
            {addNew&&(
              <div style={{...s.card,marginBottom:16}}>
                <div style={{fontWeight:600,marginBottom:12,color:'#6B7280',fontSize:13}}>Nouvelle position</div>
                <PosForm isNew init={{ticker:'',name:'',env:'CTO',cat:'Quality Core',pc1:0,mos:30,mouvements:[]}} onSave={addPos} onCancel={()=>setAddNew(false)} s={s}/>
              </div>
            )}
            <div style={s.card}>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead><tr>
                    <th style={s.th}>Ticker</th><th style={s.th}>Nom</th><th style={s.th}>Env.</th><th style={s.th}>Cat.</th>
                    <th style={s.th}>Qté</th><th style={s.th}>1er achat</th><th style={s.th}>Dern. mvt</th>
                    <th style={s.th}>PC1</th><th style={s.th}>MoS%</th><th style={s.th}>Actions</th>
                  </tr></thead>
                  <tbody>
                    {editorList.length===0&&<tr><td colSpan={10} style={{...s.td,textAlign:'center',color:'#9CA3AF',padding:40}}>Aucun titre dans cette catégorie</td></tr>}
                    {editorList.map((p,idx)=>{
                      const c=calc[p.id];
                      const sameTk=idx>0&&editorList[idx-1].ticker===p.ticker; // 2e poche du même titre
                      return(
                      <Fragment key={p.id}>
                        {editId===p.id?(
                          <tr><td colSpan={10} style={{padding:16,background:'#FAFAF8'}}>
                            <PosForm init={p} onSave={updPos} onCancel={()=>setEditId(null)} s={s}/>
                          </td></tr>
                        ):delId===p.id?(
                          <tr style={{background:'#FEF2F2'}}>
                            <td colSpan={10} style={{...s.td,padding:'12px 16px'}}>
                              <span style={{color:'#DC2626'}}>Supprimer <strong>{p.ticker}</strong> ({p.env}) ?</span>
                              <button style={{...s.btn,background:'#DC2626',color:'#fff',marginLeft:14,padding:'3px 12px',fontSize:12}} onClick={()=>delPos(p.id)}>Confirmer</button>
                              <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',marginLeft:6,padding:'3px 12px',fontSize:12}} onClick={()=>setDelId(null)}>Annuler</button>
                            </td>
                          </tr>
                        ):(
                          <tr onMouseEnter={e=>e.currentTarget.style.background='#FAFAF8'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                            <td style={{...s.td,borderLeft:sameTk?'2px solid #E0DED8':'2px solid transparent'}}>{sameTk?<span style={{color:'#9CA3AF'}}>↳ <span style={{fontSize:11}}>{p.ticker}</span></span>:<strong>{p.ticker}</strong>}</td>
                            <td style={{...s.td,color:'#6B7280'}}>{p.name}</td>
                            <td style={s.td}><Badge text={p.env} color={ENV_CLR[p.env]}/></td>
                            <td style={s.td}><span style={{color:CAT_CLR[p.cat],fontSize:11,fontWeight:600}}>{p.cat}</span></td>
                            <td style={{...s.td,color:c.qte>0?'#6B7280':'#D1D5DB'}}>{c.qte||0}</td>
                            <td style={{...s.td,color:'#6B7280'}}>{fmtDate(c.firstBuy)}</td>
                            <td style={{...s.td,color:c.lastType==='vente'?'#DC2626':'#6B7280'}}>{fmtDate(c.last)}</td>
                            <td style={{...s.td,color:'#6B7280'}}>{p.pc1?fmt(p.pc1):'—'}</td>
                            <td style={{...s.td,color:'#6B7280'}}>{p.mos}%</td>
                            <td style={s.td}>
                              <div style={{display:'flex',gap:4}}>
                                <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',padding:'3px 10px',fontSize:12}} onClick={()=>{setEditId(p.id);setAddNew(false);}}>✏️</button>
                                <button style={{...s.btn,background:'#FEE2E2',color:'#DC2626',padding:'3px 10px',fontSize:12}} onClick={()=>setDelId(p.id)}>🗑️</button>
                              </div>
                            </td>
                          </tr>
                        )}
                      </Fragment>
                    );})}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
