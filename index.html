function Badge({text,color}){
  return <span style={{display:'inline-block',padding:'2px 7px',borderRadius:4,fontSize:11,fontWeight:600,background:color+'18',color}}>{text}</span>;
}

function MosBar({value,label}){
  const clr=mosClr(value);
  return(
    <div style={{marginTop:5}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:2}}>
        <span style={{color:'#9CA3AF'}}>{label}</span>
        <span style={{color:clr,fontWeight:700}}>{value==null?'—':(value>=0?'+':'')+fmt(value)+'%'}</span>
      </div>
      {value!=null&&<div style={{height:3,background:'#EEEDE9',borderRadius:2}}>
        <div style={{width:Math.min(Math.abs(value),100)+'%',height:'100%',background:clr,borderRadius:2}}/>
      </div>}
    </div>
  );
}

function PcCard({label,pc,mos,cur}){
  const has=pc>0;
  const bg=!has?'#FAFAF8':mos>=0?'#F0FDF4':'#FEF2F2';
  const border=!has?'#EEEDE9':mos>=0?'#16A34A30':'#DC262630';
  return(
    <div style={{background:bg,border:'1px solid '+border,borderRadius:8,padding:'10px 12px',flex:1,minWidth:120}}>
      <div style={{fontSize:9,color:'#9CA3AF',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>{label}</div>
      <div style={{fontSize:15,fontWeight:700,color:has?(mos>=0?'#16A34A':'#191919'):'#D1D5DB'}}>
        {has?fmt(pc):'—'}{has&&cur&&<span style={{fontSize:10,color:'#9CA3AF',marginLeft:3}}>{cur}</span>}
      </div>
      <MosBar value={mos} label="Marge act."/>
    </div>
  );
}

function PieChart({data,colorMap,size=170}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return <div style={{color:'#9CA3AF',textAlign:'center',padding:20,fontSize:12}}>Renseignez quantités et PRU</div>;
  let cum=-Math.PI/2; const R=80,cx=100,cy=100;
  const slices=data.map(d=>{
    const angle=(d.value/total)*2*Math.PI,a1=cum,a2=cum+angle; cum=a2;
    return{...d,x1:cx+R*Math.cos(a1),y1:cy+R*Math.sin(a1),x2:cx+R*Math.cos(a2),y2:cy+R*Math.sin(a2),
      large:angle>Math.PI?1:0,mx:cx+(R*.65)*Math.cos((a1+a2)/2),my:cy+(R*.65)*Math.sin((a1+a2)/2),
      pct:Math.round(d.value/total*100),color:colorMap[d.name]||'#2563EB'};
  });
  return(
    <svg viewBox="0 0 200 200" style={{width:size,height:size}}>
      {slices.map((sl,i)=>(
        <g key={i}>
          <path d={`M ${cx} ${cy} L ${sl.x1} ${sl.y1} A ${R} ${R} 0 ${sl.large} 1 ${sl.x2} ${sl.y2} Z`} fill={sl.color} stroke="#FFF" strokeWidth="2"/>
          {sl.pct>5&&<text x={sl.mx} y={sl.my} textAnchor="middle" dominantBaseline="middle" style={{fontSize:10,fill:'#fff',fontWeight:700}}>{sl.pct}%</text>}
        </g>
      ))}
    </svg>
  );
}

function App(){
  const [pos,       setPos]       = useState([]);
  const [wl,        setWl]        = useState([]);
  const [prices,    setPrices]    = useState({});
  const [fx,        setFX]        = useState({});
  const [loading,   setLoading]   = useState(true);
  const [fetching,  setFetching]  = useState(false);
  const [lastUpd,   setLastUpd]   = useState(null);
  const [error,     setError]     = useState(null);
  const [tab,       setTab]       = useState('portfolio');
  const [expanded,  setExpanded]  = useState(new Set());
  const [editId,    setEditId]    = useState(null);
  const [addNew,    setAddNew]    = useState(false);
  const [delId,     setDelId]     = useState(null);
  const [fEnv,      setFEnv]      = useState('ALL');
  const [fCat,      setFCat]      = useState('ALL');
  const [wlAdding,  setWlAdding]  = useState(false);
  const [wlEditId,  setWlEditId]  = useState(null);

  const toEUR=(amount,currency)=>{
    if(!amount) return null;
    if(!currency||currency==='EUR') return amount;
    if(currency==='USD') return fx['EURUSD=X']?amount/fx['EURUSD=X']:null;
    if(currency==='CAD') return fx['EURCAD=X']?amount/fx['EURCAD=X']:null;
    if(currency==='DKK') return fx['EURDKK=X']?amount/fx['EURDKK=X']:null;
    return amount;
  };

  function calcPos(p){
    const px=prices[p.ticker],cours=px?.p??null,cur=px?.c??'';
    const pc2=p.pc1>0?p.pc1*(1-p.mos/200):0;
    const pc3=p.pc1>0?p.pc1*(1-p.mos/100):0;
    const pl_pct=cours&&p.pru?((cours-p.pru)/p.pru)*100:null;
    const pl_abs=cours&&p.pru&&p.qte?(cours-p.pru)*p.qte:null;
    const pl_eur=toEUR(pl_abs,cur);
    const mos1=cours&&p.pc1?((p.pc1-cours)/p.pc1)*100:null;
    const mos2=cours&&pc2?((pc2-cours)/pc2)*100:null;
    const mos3=cours&&pc3?((pc3-cours)/pc3)*100:null;
    const val=cours&&p.qte?cours*p.qte:null;
    const valEUR=toEUR(val,cur);
    return {cours,cur,pc2,pc3,pl_pct,pl_abs,pl_eur,mos1,mos2,mos3,val,valEUR};
  }

  useEffect(()=>{init();},[]);

  async function init(){
    const {data:posData,error:e1}=await db.from('positions').select('*').order('id');
    if(e1){setError('Supabase: '+e1.message);setLoading(false);return;}
    let positions=posData&&posData.length>0?posData:[];
    if(positions.length===0){
      const {data:seeded}=await db.from('positions').insert(SEED).select();
      positions=seeded||[];
    }
    setPos(positions);
    const {data:wlData}=await db.from('watchlist').select('*').order('id');
    const watchlist=wlData||[];
    setWl(watchlist);
    await doFetch(positions,watchlist);
    setLoading(false);
  }

  async function doFetch(p,w){
    setFetching(true);setError(null);
    const positions=p||pos, watchlist=w||wl;
    const allTickers=[...new Set([
      ...positions.map(x=>x.ticker),
      ...watchlist.map(x=>x.ticker),
      ...FX_TICKERS,
    ])];
    try{
      const px=await fetchAllPrices(allTickers);
      const newFX={};
      FX_TICKERS.forEach(t=>{if(px[t]){newFX[t]=px[t].p;delete px[t];}});
      setFX(newFX);setPrices(px);setLastUpd(new Date());
    }catch(e){setError('Erreur : '+e.message);}
    setFetching(false);
  }

  async function fetchAllPrices(tickers){
    const BATCH=10,px={};
    for(let i=0;i<tickers.length;i+=BATCH){
      const syms=tickers.slice(i,i+BATCH).join(',');
      try{
        const r=await fetch(`/api/prices?symbols=${encodeURIComponent(syms)}`);
        const d=await r.json();
        (d.quoteResponse?.result||[]).forEach(q=>{px[q.symbol]={p:q.regularMarketPrice,c:q.currency};});
      }catch{}
    }
    return px;
  }

  // Positions CRUD
  async function addPos(f){const {data}=await db.from('positions').insert([f]).select();if(data){const u=[...pos,...data];setPos(u);doFetch(u,wl);}setAddNew(false);}
  async function updPos(f){await db.from('positions').update(f).eq('id',f.id);const u=pos.map(x=>x.id===f.id?f:x);setPos(u);setEditId(null);doFetch(u,wl);}
  async function delPos(id){await db.from('positions').delete().eq('id',id);setPos(pos.filter(x=>x.id!==id));setDelId(null);}

  // Watchlist CRUD
  async function addWl(f){const {data}=await db.from('watchlist').insert([f]).select();if(data){const u=[...wl,...data];setWl(u);doFetch(pos,u);}setWlAdding(false);}
  async function updWl(f){await db.from('watchlist').update(f).eq('id',f.id);const u=wl.map(x=>x.id===f.id?f:x);setWl(u);setWlEditId(null);doFetch(pos,u);}
  async function delWl(id){await db.from('watchlist').delete().eq('id',id);setWl(wl.filter(x=>x.id!==id));}

  const toggle=id=>setExpanded(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});

  const s={
    btn: {padding:'6px 14px',borderRadius:6,border:'none',cursor:'pointer',fontSize:13,fontWeight:600},
    lbl: {fontSize:11,color:'#9CA3AF',marginBottom:4,display:'block'},
    inp: {background:'#FFFFFF',border:'1px solid #E0DED8',borderRadius:6,padding:'5px 8px',color:'#191919',fontSize:13,width:'100%'},
    th:  {padding:'9px 12px',textAlign:'left',color:'#9CA3AF',fontWeight:600,fontSize:11,textTransform:'uppercase',letterSpacing:'0.05em',borderBottom:'1px solid #F0EFE9',whiteSpace:'nowrap'},
    td:  {padding:'10px 12px',borderBottom:'1px solid #F7F6F3',verticalAlign:'middle'},
    card:{background:'#FFFFFF',borderRadius:12,padding:16,border:'1px solid #EEEDE9'},
  };

  if(loading) return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'#F7F6F3'}}>
      <div style={{textAlign:'center',color:'#9CA3AF'}}><div style={{fontSize:44,marginBottom:12}}>📊</div><div>Chargement...</div></div>
    </div>
  );

  // Derived
  const filtered =pos.filter(p=>(fEnv==='ALL'||p.env===fEnv)&&(fCat==='ALL'||p.cat===fCat));
  const grouped  =CATS.map(cat=>({cat,items:filtered.filter(p=>p.cat===cat)})).filter(g=>g.items.length>0);
  const totalEUR =pos.reduce((s,p)=>s+(calcPos(p).valEUR||0),0);

  const byTicker={};
  pos.forEach(p=>{
    const {valEUR}=calcPos(p);
    if(!byTicker[p.ticker]) byTicker[p.ticker]={ticker:p.ticker,name:p.name,cat:p.cat,envs:[],valEUR:0};
    byTicker[p.ticker].valEUR+=(valEUR||0);
    if(!byTicker[p.ticker].envs.includes(p.env)) byTicker[p.ticker].envs.push(p.env);
  });
  const posRankedEUR=Object.values(byTicker).sort((a,b)=>b.valEUR-a.valEUR);
  const byEnv=ENVS.map(e=>({name:e,value:Math.round(pos.filter(p=>p.env===e).reduce((s,p)=>s+(calcPos(p).valEUR||0),0))})).filter(x=>x.value>0);
  const byCat=CATS.map(c=>({name:c,value:Math.round(pos.filter(p=>p.cat===c).reduce((s,p)=>s+(calcPos(p).valEUR||0),0))})).filter(x=>x.value>0);

  // Watchlist merged (portfolio + watchlist autonome), triée par marge PC1 décroissante
  const seenTk=new Set();
  const wlMerged=[];
  pos.filter(p=>p.pc1>0).forEach(p=>{
    if(!seenTk.has(p.ticker)){seenTk.add(p.ticker);wlMerged.push({...p,wlType:'portfolio'});}
  });
  wl.forEach(w=>{
    if(!seenTk.has(w.ticker)){seenTk.add(w.ticker);wlMerged.push({...w,wlType:'watch',env:null,qte:0,pru:0});}
  });
  wlMerged.sort((a,b)=>{
    const px=t=>prices[t]?.p;
    const ma=px(a.ticker)&&a.pc1?((a.pc1-px(a.ticker))/a.pc1)*100:-999;
    const mb=px(b.ticker)&&b.pc1?((b.pc1-px(b.ticker))/b.pc1)*100:-999;
    return mb-ma;
  });

  return(
    <div style={{background:'#F7F6F3',minHeight:'100vh',color:'#191919',fontFamily:'system-ui,sans-serif',fontSize:14}}>

      {/* Header */}
      <div style={{padding:'14px 24px',borderBottom:'1px solid #EEEDE9',display:'flex',alignItems:'center',justifyContent:'space-between',background:'#FFFFFF'}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,letterSpacing:'-0.02em'}}>📊 Portfolio Tracker</div>
          <div style={{fontSize:12,color:'#9CA3AF',marginTop:2}}>
            {lastUpd?`Actualisé le ${lastUpd.toLocaleDateString('fr-FR')} à ${lastUpd.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`:'—'}
            {fetching&&<span style={{color:'#CF6D56',marginLeft:8}}>⟳ Chargement...</span>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          {error&&<span style={{color:'#DC2626',fontSize:12,maxWidth:260}}>⚠️ {error}</span>}
          <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280'}} onClick={()=>doFetch()} disabled={fetching}>⟳ Actualiser</button>
        </div>
      </div>

      {/* Summary */}
      <div style={{display:'flex',gap:10,padding:'12px 24px',background:'#FFFFFF',borderBottom:'1px solid #EEEDE9',overflowX:'auto'}}>
        {[{l:'Positions',v:pos.length},{l:'PEA',v:pos.filter(p=>p.env==='PEA').length+' pos.'},{l:'CTO',v:pos.filter(p=>p.env==='CTO').length+' pos.'},{l:'PER',v:pos.filter(p=>p.env==='PER').length+' pos.'},{l:'Valeur totale (€)',v:totalEUR>0?fmtEUR(totalEUR):'—'}]
          .map(({l,v})=>(
          <div key={l} style={{flex:'none',minWidth:120,padding:'10px 14px',background:'#F7F6F3',borderRadius:10,border:'1px solid #EEEDE9'}}>
            <div style={{fontSize:10,color:'#9CA3AF',marginBottom:4,textTransform:'uppercase',letterSpacing:'0.05em'}}>{l}</div>
            <div style={{fontWeight:700,fontSize:15}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:2,padding:'10px 24px',background:'#FFFFFF',borderBottom:'1px solid #EEEDE9'}}>
        {[{id:'portfolio',l:'📋 Portefeuille'},{id:'watchlist',l:'👁 Watchlist'},{id:'allocation',l:'🥧 Allocation'},{id:'editeur',l:'✏️ Éditeur'}].map(({id,l})=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{...s.btn,background:tab===id?'#191919':'transparent',color:tab===id?'#FFFFFF':'#6B7280',padding:'7px 16px'}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{padding:24}}>

        {/* ── PORTEFEUILLE ── */}
        {tab==='portfolio'&&(
          <div>
            <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
              <div style={{display:'flex',gap:3}}>
                {['ALL',...ENVS].map(e=>(
                  <button key={e} onClick={()=>setFEnv(e)}
                    style={{...s.btn,background:fEnv===e?(ENV_CLR[e]||'#191919'):'#F0EFE9',color:fEnv===e?'#fff':'#6B7280',padding:'4px 12px',fontSize:12}}>
                    {e==='ALL'?'Toutes env.':e}
                  </button>
                ))}
              </div>
              <div style={{width:1,height:20,background:'#EEEDE9'}}/>
              <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                {['ALL',...CATS].map(c=>(
                  <button key={c} onClick={()=>setFCat(c)}
                    style={{...s.btn,background:fCat===c?(CAT_CLR[c]||'#191919'):'#F0EFE9',color:fCat===c?'#fff':'#6B7280',padding:'4px 12px',fontSize:12}}>
                    {c==='ALL'?'Toutes cat.':c}
                  </button>
                ))}
              </div>
            </div>
            <div style={{overflowX:'auto',borderRadius:12,border:'1px solid #EEEDE9',background:'#FFFFFF'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                <thead>
                  <tr style={{background:'#FAFAF8'}}>
                    <th style={{...s.th,width:28}}></th>
                    <th style={s.th}>Titre</th><th style={s.th}>Env.</th><th style={s.th}>Qté</th>
                    <th style={s.th}>PRU</th><th style={s.th}>Cours</th>
                    <th style={s.th}>+/- %</th><th style={s.th}>+/- €</th><th style={s.th}>Valeur €</th>
                  </tr>
                </thead>
                <tbody>
                  {grouped.map(({cat,items})=>(
                    <Fragment key={cat}>
                      <tr><td colSpan={9} style={{padding:'6px 12px',background:'#F7F6F3',fontSize:10,fontWeight:700,color:CAT_CLR[cat],textTransform:'uppercase',letterSpacing:'0.08em'}}>▪ {cat}</td></tr>
                      {items.map(p=>{
                        const {cours,cur,pc2,pc3,pl_pct,pl_eur,mos1,mos2,mos3,valEUR}=calcPos(p);
                        const isExp=expanded.has(p.id);
                        return(
                          <Fragment key={p.id}>
                            <tr onClick={()=>toggle(p.id)} style={{cursor:'pointer'}}
                              onMouseEnter={e=>e.currentTarget.style.background='#FAFAF8'}
                              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                              <td style={{...s.td,color:'#9CA3AF',fontSize:12}}>{isExp?'▾':'▸'}</td>
                              <td style={s.td}><div style={{fontWeight:600}}>{p.ticker}</div><div style={{fontSize:11,color:'#9CA3AF'}}>{p.name}</div></td>
                              <td style={s.td}><Badge text={p.env} color={ENV_CLR[p.env]}/></td>
                              <td style={{...s.td,color:'#6B7280'}}>{p.qte||'—'}</td>
                              <td style={{...s.td,color:'#6B7280'}}>{p.pru?fmt(p.pru)+' '+cur:'—'}</td>
                              <td style={s.td}><span style={{fontWeight:600}}>{cours?fmt(cours):'—'}</span>{cur&&<span style={{fontSize:10,color:'#9CA3AF',marginLeft:4}}>{cur}</span>}</td>
                              <td style={s.td}><span style={{color:pClr(pl_pct),fontWeight:600}}>{pl_pct==null?'—':(pl_pct>=0?'+':'')+fmt(pl_pct)+'%'}</span></td>
                              <td style={s.td}><span style={{color:pClr(pl_eur),fontWeight:600}}>{pl_eur==null?'—':(pl_eur>=0?'+':'')+fmt(pl_eur,0)+' €'}</span></td>
                              <td style={{...s.td,color:'#6B7280'}}>{valEUR?fmtEUR(valEUR):'—'}</td>
                            </tr>
                            {isExp&&(
                              <tr><td colSpan={9} style={{padding:'14px 24px',background:'#FAFAF8',borderBottom:'1px solid #EEEDE9'}}>
                                <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'stretch'}}>
                                  <PcCard label="PC1 — Prix juste" pc={p.pc1} mos={mos1} cur={cur}/>
                                  <PcCard label={`PC2 — ½ MoS (${(p.mos/2).toFixed(0)}%)`} pc={pc2} mos={mos2} cur={cur}/>
                                  <PcCard label={`PC3 — MoS pleine (${p.mos}%)`} pc={pc3} mos={mos3} cur={cur}/>
                                  <div style={{marginLeft:8,alignSelf:'center'}}>
                                    <div style={{fontSize:11,color:'#9CA3AF'}}>MoS requise</div>
                                    <div style={{fontWeight:800,fontSize:22,marginTop:2}}>{p.mos}%</div>
                                    <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',marginTop:10,fontSize:12,padding:'4px 12px'}}
                                      onClick={e=>{e.stopPropagation();setEditId(p.id);setTab('editeur');}}>✏️ Modifier</button>
                                  </div>
                                </div>
                              </td></tr>
                            )}
                          </Fragment>
                        );
                      })}
                    </Fragment>
                  ))}
                  {grouped.length===0&&<tr><td colSpan={9} style={{...s.td,textAlign:'center',color:'#9CA3AF',padding:40}}>Aucune position</td></tr>}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:11,color:'#D1D5DB',marginTop:8}}>▸ Cliquez sur une ligne pour afficher les prix cibles</div>
          </div>
        )}

        {/* ── WATCHLIST ── */}
        {tab==='watchlist'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div>
                <div style={{fontWeight:700,fontSize:16}}>Watchlist</div>
                <div style={{fontSize:12,color:'#9CA3AF',marginTop:2}}>Triée par attractivité décroissante — marge vs PC1</div>
              </div>
              <button style={{...s.btn,background:'#CF6D56',color:'#fff'}} onClick={()=>{setWlAdding(!wlAdding);setWlEditId(null);}}>
                {wlAdding?'✕ Annuler':'+ Ajouter'}
              </button>
            </div>

            {wlAdding&&(
              <div style={{...s.card,marginBottom:16}}>
                <div style={{fontWeight:600,marginBottom:12,color:'#6B7280',fontSize:13}}>Nouveau titre</div>
                <WlForm init={{ticker:'',name:'',pc1:0,mos:30}} onSave={addWl} onCancel={()=>setWlAdding(false)} s={s}/>
              </div>
            )}

            {wlEditId&&(
              <div style={{...s.card,marginBottom:16,borderLeft:'3px solid #CF6D56'}}>
                <div style={{fontWeight:600,marginBottom:12,color:'#6B7280',fontSize:13}}>Modifier le titre</div>
                <WlForm
                  init={wl.find(x=>x.id===wlEditId)||{}}
                  onSave={updWl}
                  onCancel={()=>setWlEditId(null)}
                  s={s}
                />
              </div>
            )}

            <div style={{overflowX:'auto',borderRadius:12,border:'1px solid #EEEDE9',background:'#FFFFFF'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                <thead>
                  <tr style={{background:'#FAFAF8'}}>
                    <th style={{...s.th,width:36}}>#</th>
                    <th style={s.th}>Titre</th><th style={s.th}>Type</th><th style={s.th}>Cours</th>
                    <th style={s.th}>PC1</th><th style={s.th}>Marge PC1 ↓</th>
                    <th style={s.th}>PC2</th><th style={s.th}>Marge PC2</th>
                    <th style={s.th}>PC3</th><th style={s.th}>Marge PC3</th>
                    <th style={s.th}>MoS req.</th><th style={s.th}></th>
                  </tr>
                </thead>
                <tbody>
                  {wlMerged.length===0&&(
                    <tr><td colSpan={12} style={{...s.td,textAlign:'center',color:'#9CA3AF',padding:40}}>
                      Aucun titre — renseignez PC1 dans vos positions ou ajoutez des titres ici
                    </td></tr>
                  )}
                  {wlMerged.map((p,idx)=>{
                    const px=prices[p.ticker];
                    const cours=px?.p??null,cur=px?.c??'';
                    const pc2=p.pc1>0?p.pc1*(1-p.mos/200):0;
                    const pc3=p.pc1>0?p.pc1*(1-p.mos/100):0;
                    const mos1=cours&&p.pc1?((p.pc1-cours)/p.pc1)*100:null;
                    const mos2=cours&&pc2?((pc2-cours)/pc2)*100:null;
                    const mos3=cours&&pc3?((pc3-cours)/pc3)*100:null;
                    const isPortfolio=p.wlType==='portfolio';
                    const rowBg=mos1!=null&&mos1>=15?'#F0FDF4':mos1!=null&&mos1>=0?'#FFFBEB':mos1!=null?'#FEF2F2':'transparent';
                    return(
                      <tr key={p.ticker} style={{background:rowBg}}>
                        <td style={{...s.td,color:'#9CA3AF',fontWeight:700}}>{idx+1}</td>
                        <td style={s.td}><div style={{fontWeight:600}}>{p.ticker}</div><div style={{fontSize:11,color:'#9CA3AF'}}>{p.name}</div></td>
                        <td style={s.td}>
                          {isPortfolio
                            ? <Badge text={p.env||'Portfolio'} color={ENV_CLR[p.env]||'#6B7280'}/>
                            : <Badge text="Watch" color="#9CA3AF"/>}
                        </td>
                        <td style={s.td}>
                          <span style={{fontWeight:600}}>{cours?fmt(cours):'—'}</span>
                          {cur&&<span style={{fontSize:10,color:'#9CA3AF',marginLeft:3}}>{cur}</span>}
                        </td>
                        {[[p.pc1,mos1],[pc2,mos2],[pc3,mos3]].map(([pc,mos],i)=>(
                          <Fragment key={i}>
                            <td style={s.td}><span style={{fontWeight:600,color:pc>0?'#191919':'#D1D5DB'}}>{pc>0?fmt(pc):'—'}</span></td>
                            <td style={s.td}>
                              <span style={{fontWeight:700,color:mosClr(mos)}}>{mos==null?'—':(mos>=0?'+':'')+fmt(mos)+'%'}</span>
                              {mos!=null&&<div style={{marginTop:3,height:3,background:'#EEEDE9',borderRadius:2,width:60}}>
                                <div style={{width:Math.min(Math.abs(mos),100)+'%',height:'100%',background:mosClr(mos),borderRadius:2}}/>
                              </div>}
                            </td>
                          </Fragment>
                        ))}
                        <td style={{...s.td,color:'#6B7280'}}>{p.mos}%</td>
                        <td style={s.td}>
                          {!isPortfolio&&(
                            <div style={{display:'flex',gap:4}}>
                              <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',padding:'3px 8px',fontSize:11}}
                                onClick={()=>{setWlEditId(p.id);setWlAdding(false);}}>✏️</button>
                              <button style={{...s.btn,background:'#FEE2E2',color:'#DC2626',padding:'3px 8px',fontSize:11}}
                                onClick={()=>delWl(p.id)}>🗑️</button>
                            </div>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:11,color:'#D1D5DB',marginTop:8}}>🟢 Marge &gt; 15% — 🟡 Marge 0-15% — 🔴 Cours au-dessus du PC1</div>
          </div>
        )}

        {/* ── ALLOCATION ── */}
        {tab==='allocation'&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              {[{title:'Par enveloppe (€)',data:byEnv,clr:ENV_CLR},{title:'Par catégorie (€)',data:byCat,clr:CAT_CLR}].map(({title,data,clr})=>(
                <div key={title} style={s.card}>
                  <div style={{fontWeight:700,marginBottom:16}}>{title}</div>
                  <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
                    <PieChart data={data} colorMap={clr}/>
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      {data.map(d=>(
                        <div key={d.name} style={{display:'flex',alignItems:'center',gap:8}}>
                          <div style={{width:10,height:10,borderRadius:2,background:clr[d.name],flexShrink:0}}/>
                          <span style={{color:'#6B7280',fontSize:12}}>{d.name}</span>
                          <span style={{fontWeight:700}}>{Math.round(d.value/data.reduce((s,x)=>s+x.value,0)*100)}%</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={s.card}>
              <div style={{fontWeight:700,marginBottom:12}}>Pondérations par titre (toutes enveloppes, en €)</div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead><tr>
                    <th style={s.th}>Ticker</th><th style={s.th}>Catégorie</th>
                    <th style={s.th}>Enveloppes</th><th style={s.th}>Valeur €</th>
                    <th style={{...s.th,minWidth:180}}>Poids</th>
                  </tr></thead>
                  <tbody>
                    {posRankedEUR.map(p=>(
                      <tr key={p.ticker}
                        onMouseEnter={e=>e.currentTarget.style.background='#FAFAF8'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                        <td style={s.td}><strong>{p.ticker}</strong> <span style={{fontSize:11,color:'#9CA3AF'}}>{p.name}</span></td>
                        <td style={s.td}><span style={{color:CAT_CLR[p.cat],fontSize:12,fontWeight:600}}>{p.cat}</span></td>
                        <td style={s.td}><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{p.envs.map(e=><Badge key={e} text={e} color={ENV_CLR[e]}/>)}</div></td>
                        <td style={s.td}>{p.valEUR>0?fmtEUR(p.valEUR):'—'}</td>
                        <td style={s.td}>
                          {totalEUR>0&&p.valEUR>0?(
                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                              <div style={{flex:1,height:6,background:'#F0EFE9',borderRadius:3}}>
                                <div style={{width:Math.min((p.valEUR/totalEUR)*100,100)+'%',height:'100%',background:CAT_CLR[p.cat],borderRadius:3}}/>
                              </div>
                              <span style={{minWidth:38,textAlign:'right',fontSize:12,color:'#6B7280'}}>{fmt((p.valEUR/totalEUR)*100,1)}%</span>
                            </div>
                          ):<span style={{color:'#D1D5DB'}}>—</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ── ÉDITEUR ── */}
        {tab==='editeur'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:16}}>Positions</div>
              {!addNew&&<button style={{...s.btn,background:'#CF6D56',color:'#fff'}} onClick={()=>{setAddNew(true);setEditId(null);}}>+ Ajouter</button>}
            </div>
            {addNew&&(
              <div style={{...s.card,marginBottom:16}}>
                <div style={{fontWeight:600,marginBottom:12,color:'#6B7280',fontSize:13}}>Nouvelle position</div>
                <PosForm isNew init={{ticker:'',name:'',env:'CTO',cat:'Core Quality',qte:0,pru:0,pc1:0,mos:30}} onSave={addPos} onCancel={()=>setAddNew(false)} s={s}/>
              </div>
            )}
            <div style={s.card}>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead><tr>
                    <th style={s.th}>Ticker</th><th style={s.th}>Nom</th><th style={s.th}>Env.</th><th style={s.th}>Cat.</th>
                    <th style={s.th}>Qté</th><th style={s.th}>PRU</th><th style={s.th}>PC1</th><th style={s.th}>MoS%</th><th style={s.th}>Actions</th>
                  </tr></thead>
                  <tbody>
                    {pos.map(p=>(
                      <Fragment key={p.id}>
                        {editId===p.id?(
                          <tr><td colSpan={9} style={{padding:16,background:'#FAFAF8'}}>
                            <PosForm init={p} onSave={updPos} onCancel={()=>setEditId(null)} s={s}/>
                          </td></tr>
                        ):delId===p.id?(
                          <tr style={{background:'#FEF2F2'}}>
                            <td colSpan={9} style={{...s.td,padding:'12px 16px'}}>
                              <span style={{color:'#DC2626'}}>Supprimer <strong>{p.ticker}</strong> ({p.env}) ?</span>
                              <button style={{...s.btn,background:'#DC2626',color:'#fff',marginLeft:14,padding:'3px 12px',fontSize:12}} onClick={()=>delPos(p.id)}>Confirmer</button>
                              <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',marginLeft:6,padding:'3px 12px',fontSize:12}} onClick={()=>setDelId(null)}>Annuler</button>
                            </td>
                          </tr>
                        ):(
                          <tr onMouseEnter={e=>e.currentTarget.style.background='#FAFAF8'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                            <td style={s.td}><strong>{p.ticker}</strong></td>
                            <td style={{...s.td,color:'#6B7280'}}>{p.name}</td>
                            <td style={s.td}><Badge text={p.env} color={ENV_CLR[p.env]}/></td>
                            <td style={s.td}><span style={{color:CAT_CLR[p.cat],fontSize:11,fontWeight:600}}>{p.cat}</span></td>
                            <td style={{...s.td,color:'#6B7280'}}>{p.qte}</td>
                            <td style={{...s.td,color:'#6B7280'}}>{p.pru?fmt(p.pru):'—'}</td>
                            <td style={{...s.td,color:'#6B7280'}}>{p.pc1?fmt(p.pc1):'—'}</td>
                            <td style={{...s.td,color:'#6B7280'}}>{p.mos}%</td>
                            <td style={s.td}>
                              <div style={{display:'flex',gap:4}}>
                                <button style={{...s.btn,background:'#F0EFE9',color:'#6B7280',padding:'3px 10px',fontSize:12}} onClick={()=>{setEditId(p.id);setAddNew(false);}}>✏️</button>
                                <button style={{...s.btn,background:'#FEE2E2',color:'#DC2626',padding:'3px 10px',fontSize:12}} onClick={()=>setDelId(p.id)}>🗑️</button>
                              </div>
                            </td>
                          </tr>
                        )}
                      </Fragment>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
