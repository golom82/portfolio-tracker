// ── Utilitaires ────────────────────────────────────────────────
const fmt  = (n,d=2) => n==null?'—':Number(n).toLocaleString('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtS = (n,c='') => n==null?'—':(n>=0?'+':'')+fmt(n,0)+(c?' '+c:'');
const pClr = n => n==null?'#64748b':n>=0?'#34d399':'#f87171';

function calcPos(p,prices){
  const px=prices[p.ticker],cours=px?.p??null,cur=px?.c??'';
  const pc2=p.pc1>0?p.pc1*(1-p.mos/200):0;
  const pc3=p.pc1>0?p.pc1*(1-p.mos/100):0;
  const pl_pct=cours&&p.pru?((cours-p.pru)/p.pru)*100:null;
  const pl_abs=cours&&p.pru&&p.qte?(cours-p.pru)*p.qte:null;
  const mos1=cours&&p.pc1?((p.pc1-cours)/p.pc1)*100:null;
  const mos2=cours&&pc2?((pc2-cours)/pc2)*100:null;
  const mos3=cours&&pc3?((pc3-cours)/pc3)*100:null;
  const val=cours&&p.qte?cours*p.qte:null;
  return {cours,cur,pc2,pc3,pl_pct,pl_abs,mos1,mos2,mos3,val};
}

// ── Yahoo Finance via fonction serverless ──────────────────────
async function fetchPrices(positions){
  const BATCH=10;
  const px={};
  for(let i=0;i<positions.length;i+=BATCH){
    const batch=positions.slice(i,i+BATCH);
    const symbols=batch.map(p=>p.ticker).join(',');
    try{
      const r=await fetch(`/api/prices?symbols=${encodeURIComponent(symbols)}`);
      const d=await r.json();
      (d.quoteResponse?.result||[]).forEach(q=>{
        const date=q.regularMarketTime
          ?new Date(q.regularMarketTime*1000).toLocaleDateString('fr-FR')
          :null;
        px[q.symbol]={p:q.regularMarketPrice,c:q.currency,d:date};
      });
    }catch{}
  }
  return px;
}

// ── Pie Chart SVG ──────────────────────────────────────────────
function PieChart({data,colorMap,size=180}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total) return <div style={{color:'#475569',textAlign:'center',padding:20,fontSize:12}}>Renseignez quantités et PRU</div>;
  let cum=-Math.PI/2;
  const R=80,cx=100,cy=100;
  const slices=data.map(d=>{
    const angle=(d.value/total)*2*Math.PI;
    const a1=cum,a2=cum+angle;cum=a2;
    return{...d,x1:cx+R*Math.cos(a1),y1:cy+R*Math.sin(a1),x2:cx+R*Math.cos(a2),y2:cy+R*Math.sin(a2),
      large:angle>Math.PI?1:0,mx:cx+(R*.65)*Math.cos((a1+a2)/2),my:cy+(R*.65)*Math.sin((a1+a2)/2),
      pct:Math.round(d.value/total*100),color:colorMap[d.name]||'#60a5fa'};
  });
  return(
    <svg viewBox="0 0 200 200" style={{width:size,height:size}}>
      {slices.map((s,i)=>(
        <g key={i}>
          <path d={`M ${cx} ${cy} L ${s.x1} ${s.y1} A ${R} ${R} 0 ${s.large} 1 ${s.x2} ${s.y2} Z`}
            fill={s.color} stroke="#0a1628" strokeWidth="1.5"/>
          {s.pct>5&&<text x={s.mx} y={s.my} textAnchor="middle" dominantBaseline="middle"
            style={{fontSize:10,fill:'#fff',fontWeight:700}}>{s.pct}%</text>}
        </g>
      ))}
    </svg>
  );
}

                              <td style={{...s.td,color:'#94a3b8'}}>{p.pru?fmt(p.pru):'—'}</td>
                              <td style={s.td}>
                                <div style={{fontWeight:600}}>{cours?fmt(cours):'—'} {cur&&<span style={{fontSize:10,color:'#475569'}}>{cur}</span>}</div>
                                {px?.d&&<div style={{fontSize:10,color:px.d===new Date().toLocaleDateString('fr-FR')?'#34d399':'#f59e0b'}}>{px.d}</div>}
                              </td>
                              <td style={s.td}><span style={{color:pClr(pl_pct),fontWeight:700}}>{pl_pct==null?'—':(pl_pct>=0?'+':'')+fmt(pl_pct)+'%'}</span></td>
                              <td style={s.td}><span style={{color:pClr(pl_abs),fontWeight:700}}>{pl_abs==null?'—':fmtS(pl_abs,cur)}</span></td>
                              <td style={{...s.td,color:'#94a3b8'}}>{val?fmt(val,0)+' '+cur:'—'}</td>
                            </tr>
                            {isExp&&(
                              <tr><td colSpan={9} style={{padding:'14px 24px',background:'#07101f',borderBottom:'2px solid #1e293b'}}>
                                <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'stretch'}}>
                                  <PcCard label="PC1 — Prix juste" pc={p.pc1} mos={mos1} cur={cur}/>
                                  <PcCard label={`PC2 — ½ MoS (${(p.mos/2).toFixed(0)}%)`} pc={pc2} mos={mos2} cur={cur}/>
                                  <PcCard label={`PC3 — MoS pleine (${p.mos}%)`} pc={pc3} mos={mos3} cur={cur}/>
                                  <div style={{marginLeft:8,alignSelf:'center',fontSize:12}}>
                                    <div style={{color:'#64748b'}}>MoS requise</div>
                                    <div style={{fontWeight:800,fontSize:22,color:'#f1f5f9',marginTop:2}}>{p.mos}%</div>
                                    <button style={{...s.btn,background:'#1e293b',color:'#94a3b8',marginTop:10,fontSize:12,padding:'4px 12px'}}
                                      onClick={e=>{e.stopPropagation();setEditId(p.id);setTab('editeur');}}>✏️ Modifier</button>
                                  </div>
                                </div>
                              </td></tr>
                            )}
                          </Fragment>
                        );
                      })}
                    </Fragment>
                  ))}
                  {grouped.length===0&&<tr><td colSpan={9} style={{...s.td,textAlign:'center',color:'#475569',padding:40}}>Aucune position</td></tr>}
                </tbody>
              </table>
            </div>
            <div style={{fontSize:11,color:'#334155',marginTop:8}}>▸ Cliquez sur une ligne pour afficher les prix cibles et marges de sécurité</div>
          </div>
        )}

        {/* ALLOCATION */}
        {tab==='allocation'&&(
          <div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              {[{title:'Par enveloppe',data:byEnv,clr:ENV_CLR},{title:'Par catégorie',data:byCat,clr:CAT_CLR}].map(({title,data,clr})=>(
                <div key={title} style={s.card}>
                  <div style={{fontWeight:700,marginBottom:16,color:'#f1f5f9'}}>{title}</div>
                  <div style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
                    <PieChart data={data} colorMap={clr}/>
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                      {data.map(d=>(
                        <div key={d.name} style={{display:'flex',alignItems:'center',gap:8,fontSize:13}}>
                          <div style={{width:10,height:10,borderRadius:2,background:clr[d.name],flexShrink:0}}/>
                          <span style={{color:'#94a3b8',fontSize:12}}>{d.name}</span>
                          <span style={{fontWeight:700,color:'#f1f5f9'}}>{Math.round(d.value/data.reduce((s,x)=>s+x.value,0)*100)}%</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={s.card}>
              <div style={{fontWeight:700,marginBottom:12,color:'#f1f5f9'}}>Pondérations par position</div>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead><tr>
                    <th style={s.th}>Ticker</th><th style={s.th}>Catégorie</th><th style={s.th}>Env.</th>
                    <th style={s.th}>Valeur</th><th style={{...s.th,minWidth:180}}>Poids</th>
                  </tr></thead>
                  <tbody>
                    {posRanked.map(p=>(
                      <tr key={p.id}>
                        <td style={s.td}><strong>{p.ticker}</strong> <span style={{fontSize:11,color:'#64748b'}}>{p.name}</span></td>
                        <td style={s.td}><span style={{color:CAT_CLR[p.cat],fontSize:12}}>{p.cat}</span></td>
                        <td style={s.td}><Badge text={p.env} color={ENV_CLR[p.env]}/></td>
                        <td style={s.td}>{p.val?fmt(p.val,0)+' '+p.cur:'—'}</td>
                        <td style={s.td}>
                          {totalVal>0&&p.val?(
                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                              <div style={{flex:1,height:6,background:'#0f172a',borderRadius:3}}>
                                <div style={{width:Math.min((p.val/totalVal)*100,100)+'%',height:'100%',background:CAT_CLR[p.cat],borderRadius:3}}/>
                              </div>
                              <span style={{minWidth:38,textAlign:'right',fontSize:12,color:'#94a3b8'}}>{fmt((p.val/totalVal)*100,1)}%</span>
                            </div>
                          ):<span style={{color:'#334155'}}>—</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* ÉDITEUR */}
        {tab==='editeur'&&(
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontWeight:700,fontSize:16,color:'#f1f5f9'}}>Positions</div>
              {!addNew&&<button style={{...s.btn,background:'#3b82f6',color:'#fff'}} onClick={()=>{setAddNew(true);setEditId(null);}}>+ Ajouter</button>}
            </div>
            {addNew&&(
              <div style={{...s.card,marginBottom:16}}>
                <div style={{fontWeight:600,marginBottom:12,color:'#94a3b8',fontSize:13}}>Nouvelle position</div>
                <PosForm isNew init={{ticker:'',name:'',env:'CTO',cat:'Core Quality',qte:0,pru:0,pc1:0,mos:30}} s={s} onSave={addPos} onCancel={()=>setAddNew(false)}/>
              </div>
            )}
            <div style={s.card}>
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                  <thead><tr>
                    <th style={s.th}>Ticker</th><th style={s.th}>Nom</th><th style={s.th}>Env.</th><th style={s.th}>Cat.</th>
                    <th style={s.th}>Qté</th><th style={s.th}>PRU</th><th style={s.th}>PC1</th><th style={s.th}>MoS%</th><th style={s.th}>Actions</th>
                  </tr></thead>
                  <tbody>
                    {pos.map(p=>(
                      <Fragment key={p.id}>
                        {editId===p.id?(
                          <tr><td colSpan={9} style={{padding:16,background:'#1e293b'}}>
                            <PosForm init={p} s={s} onSave={updPos} onCancel={()=>setEditId(null)}/>
                          </td></tr>
                        ):delId===p.id?(
                          <tr style={{background:'#7f1d1d18'}}>
                            <td colSpan={9} style={{...s.td,padding:'12px 16px'}}>
                              <span style={{color:'#fca5a5'}}>Supprimer <strong>{p.ticker}</strong> ?</span>
                              <button style={{...s.btn,background:'#ef4444',color:'#fff',marginLeft:14,padding:'3px 12px',fontSize:12}} onClick={()=>delPos(p.id)}>Confirmer</button>
                              <button style={{...s.btn,background:'#1e293b',color:'#64748b',marginLeft:6,padding:'3px 12px',fontSize:12}} onClick={()=>setDelId(null)}>Annuler</button>
                            </td>
                          </tr>
                        ):(
                          <tr onMouseEnter={e=>e.currentTarget.style.background='#1e293b60'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                            <td style={s.td}><strong>{p.ticker}</strong></td>
                            <td style={{...s.td,color:'#94a3b8'}}>{p.name}</td>
                            <td style={s.td}><Badge text={p.env} color={ENV_CLR[p.env]}/></td>
                            <td style={s.td}><span style={{color:CAT_CLR[p.cat],fontSize:11}}>{p.cat}</span></td>
                            <td style={{...s.td,color:'#94a3b8'}}>{p.qte}</td>
                            <td style={{...s.td,color:'#94a3b8'}}>{p.pru?fmt(p.pru):'—'}</td>
                            <td style={{...s.td,color:'#94a3b8'}}>{p.pc1?fmt(p.pc1):'—'}</td>
                            <td style={{...s.td,color:'#94a3b8'}}>{p.mos}%</td>
                            <td style={s.td}>
                              <div style={{display:'flex',gap:4}}>
                                <button style={{...s.btn,background:'#1e293b',color:'#94a3b8',padding:'3px 10px',fontSize:12}} onClick={()=>{setEditId(p.id);setAddNew(false);}}>✏️</button>
                                <button style={{...s.btn,background:'#7f1d1d',color:'#fca5a5',padding:'3px 10px',fontSize:12}} onClick={()=>setDelId(p.id)}>🗑️</button>
                              </div>
                            </td>
                          </tr>
                        )}
                      </Fragment>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
